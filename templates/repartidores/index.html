{% extends "base.html" %}
{% block title %}Repartidores{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2><i class="bi bi-truck me-2"></i>Repartidores</h2>
  <a href="{{ url_for('repartidor_nuevo') }}" class="btn btn-primary"><i class="bi bi-plus me-1"></i>Nuevo</a>
</div>
<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-light"><tr><th>Nombre</th><th>Licencia</th><th>Estado</th><th></th></tr></thead>
      <tbody>
      {% for r in repartidores %}
        <tr>
          <td>{{ r.nombre }}</td>
          <td><code>{{ r.licencia }}</code></td>
          <td><span class="badge badge-estado-{{ r.estado_repartidor }}">{{ r.estado_repartidor }}</span></td>
          <td class="text-end">
            <a href="{{ url_for('repartidor_editar', id=r.id_repartidor) }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
            <form method="post" action="{{ url_for('repartidor_eliminar', id=r.id_repartidor) }}" class="d-inline" onsubmit="return confirm('¿Eliminar este repartidor?')">
              <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
            </form>
          </td>
        </tr>
      {% else %}
        <tr><td colspan="4" class="text-center text-muted py-4">Sin repartidores.</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
