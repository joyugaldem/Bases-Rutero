{% extends "base.html" %}
{% block title %}{{ 'Editar' if cliente else 'Nuevo' }} Cliente{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-3 gap-2">
  <a href="{{ url_for('clientes_lista') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
  <h2 class="mb-0">{{ 'Editar' if cliente else 'Nuevo' }} Cliente</h2>
</div>
<div class="card" style="max-width:600px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Nombre del contacto *</label>
        <input type="text" name="nombre" class="form-control" required value="{{ cliente.nombre if cliente else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Razón social / Nombre comercial *</label>
        <input type="text" name="razon_social" class="form-control" required value="{{ cliente.razon_social if cliente else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Dirección (provincia, cantón, distrito, señas) *</label>
        <textarea name="direccion" class="form-control" rows="2" required>{{ cliente.direccion_compuesta if cliente else '' }}</textarea>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">Teléfono</label>
          <input type="text" name="telefono" class="form-control" placeholder="8888-1234">
        </div>
        <div class="col-md-6">
          <label class="form-label">Tipo de teléfono</label>
          <select name="tipo_telefono" class="form-select">
            <option>Móvil</option><option>Fijo</option><option>WhatsApp</option>
          </select>
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">Ruta asignada</label>
          <select name="id_ruta" class="form-select">
            <option value="">— Sin ruta —</option>
            {% for r in rutas %}
              <option value="{{ r.id_ruta }}" {{ 'selected' if cliente and cliente.ruta_nombre == r.nombre }}>{{ r.nombre }} ({{ r.zona_geografica }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6 d-flex align-items-end">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="credito" value="1" id="credito"
              {{ 'checked' if cliente and cliente.credito_autorizado }}>
            <label class="form-check-label" for="credito">Crédito autorizado</label>
          </div>
        </div>
      </div>
      {% if cliente %}
      <div class="mb-3">
        <label class="form-label">Estado</label>
        <select name="estado" class="form-select">
          {% for e in estados %}
            <option {{ 'selected' if cliente.estado_cliente == e }}>{{ e }}</option>
          {% endfor %}
        </select>
      </div>
      {% endif %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{{ url_for('clientes_lista') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
