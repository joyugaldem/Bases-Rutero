{% extends "base.html" %}
{% block title %}Nueva Factura{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-3 gap-2">
  <a href="{{ url_for('facturacion_lista') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
  <h2 class="mb-0">Nueva Factura</h2>
</div>
<div class="card">
  <div class="card-body">
    <form method="post" id="frmFactura">
      <div class="row g-3">
        <!-- Encabezado -->
        <div class="col-md-4">
          <label class="form-label">Cliente *</label>
          <select name="id_cliente" class="form-select" required>
            <option value="">Seleccionar…</option>
            {% for c in clientes %}<option value="{{ c.id_cliente }}">{{ c.razon_social }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Repartidor *</label>
          <select name="id_repartidor" class="form-select" required>
            <option value="">Seleccionar…</option>
            {% for r in repartidores %}<option value="{{ r.id_repartidor }}">{{ r.nombre }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Recorrido *</label>
          <select name="id_recorrido" class="form-select" required>
            <option value="">Seleccionar…</option>
            {% for r in recorridos %}<option value="{{ r.id_recorrido }}">{{ r.ruta }} – {{ r.fecha }} {{ r.turno }}</option>{% endfor %}
          </select>
        </div>
        <!-- Condición de pago -->
        <div class="col-md-4">
          <label class="form-label">Condición de pago *</label>
          <select name="condicion_pago" class="form-select" id="condPago" required>
            <option value="Contado">Contado</option>
            <option value="Crédito">Crédito</option>
          </select>
        </div>
        <!-- Pago al contado -->
        <div class="col-md-4" id="divContado">
          <label class="form-label">Monto recibido (₡)</label>
          <input type="number" step="0.01" name="monto_recibido" class="form-control">
        </div>
        <!-- Crédito -->
        <div class="col-md-2 d-none" id="divFechaVenc">
          <label class="form-label">Vence crédito</label>
          <input type="date" name="fecha_vencimiento_credito" class="form-control">
        </div>
        <div class="col-md-2 d-none" id="divLimite">
          <label class="form-label">Límite crédito (₡)</label>
          <input type="number" step="0.01" name="limite_credito" class="form-control">
        </div>
        <!-- Detalle -->
        <div class="col-12"><hr><h5>Detalle del producto</h5></div>
        <div class="col-md-5">
          <label class="form-label">Presentación (producto) *</label>
          <select name="id_presentacion" class="form-select" required id="selPresentacion">
            <option value="">Seleccionar…</option>
            {% for item in catalogo %}
              <option value="{{ item.id_presentacion }}" data-lote="{{ item.id_lote }}" data-precio="{{ item.precio_venta }}" data-disp="{{ item.cantidad_disponible }}">
                {{ item.nombre_comercial }} – {{ item.presentacion }} (₡{{ "{:,.0f}".format(item.precio_venta) }}) [disp: {{ item.cantidad_disponible }}]
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Lote seleccionado</label>
          <input type="hidden" name="id_lote" id="inputLote">
          <input type="text" class="form-control" id="textoLote" readonly placeholder="Se asigna automáticamente">
        </div>
        <div class="col-md-2">
          <label class="form-label">Cantidad *</label>
          <input type="number" min="1" name="cantidad" class="form-control" required id="inputCantidad">
        </div>
        <div class="col-md-2">
          <label class="form-label">Subtotal</label>
          <input type="text" class="form-control" id="subtotal" readonly>
        </div>
      </div>
      <div class="mt-3 d-flex gap-2">
        <button type="submit" class="btn btn-success"><i class="bi bi-check-circle me-1"></i>Crear Factura</button>
        <a href="{{ url_for('facturacion_lista') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const condPago = document.getElementById('condPago');
const divContado = document.getElementById('divContado');
const divFechaVenc = document.getElementById('divFechaVenc');
const divLimite = document.getElementById('divLimite');
condPago.addEventListener('change', () => {
  const esCred = condPago.value === 'Crédito';
  divContado.classList.toggle('d-none', esCred);
  divFechaVenc.classList.toggle('d-none', !esCred);
  divLimite.classList.toggle('d-none', !esCred);
});
const selPres = document.getElementById('selPresentacion');
const inputLote = document.getElementById('inputLote');
const textoLote = document.getElementById('textoLote');
const inputCant = document.getElementById('inputCantidad');
const subtotalEl = document.getElementById('subtotal');
function updateSubtotal() {
  const opt = selPres.options[selPres.selectedIndex];
  if (!opt.value) return;
  const precio = parseFloat(opt.dataset.precio) || 0;
  const cant = parseInt(inputCant.value) || 0;
  inputLote.value = opt.dataset.lote || '';
  textoLote.value = 'Lote #' + (opt.dataset.lote || '');
  subtotalEl.value = '₡' + (precio * cant).toLocaleString('es-CR', {minimumFractionDigits:2});
}
selPres.addEventListener('change', updateSubtotal);
inputCant.addEventListener('input', updateSubtotal);
</script>
{% endblock %}
