{% extends "base.html" %}
{% block title %}Nuevo Lote{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-3 gap-2">
  <a href="{{ url_for('producto_detalle', id=producto.id_producto) }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
  <h2 class="mb-0">Nuevo lote &mdash; {{ producto.nombre_comercial }}</h2>
</div>
<div class="card" style="max-width:480px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Número de lote *</label>
        <input type="text" name="numero_lote" class="form-control" placeholder="LOT-YYYYMMDD-###" required>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label">Fecha elaboración *</label>
          <input type="date" name="fecha_elaboracion" class="form-control" required>
        </div>
        <div class="col-6">
          <label class="form-label">Fecha vencimiento *</label>
          <input type="date" name="fecha_vencimiento" class="form-control" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Cantidad producida *</label>
        <input type="number" min="1" name="cantidad" class="form-control" required>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{{ url_for('producto_detalle', id=producto.id_producto) }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
